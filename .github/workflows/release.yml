name: Create Release on Tag Push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v4.1.4"
        required: true
        type: string
      ref:
        description: "Optional full git ref/SHA to build. Defaults to the release tag."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      BUILD_REF_INPUT: ${{ inputs.ref }}
    steps:
      - name: Checkout
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_TAG}" || "${RELEASE_TAG}" != v* ]]; then
            echo "RELEASE_TAG must start with v, got: ${RELEASE_TAG}"
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            build_ref="${BUILD_REF_INPUT:-refs/tags/${RELEASE_TAG}}"
          else
            build_ref="${GITHUB_REF}"
          fi

          git init .
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${build_ref}"
          git checkout --force FETCH_HEAD

      - name: Install pnpm
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          npm install --global pnpm@8.15.9
          pnpm --version

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build for production
        shell: bash
        run: pnpm build

      - name: Verify package.zip
        shell: bash
        run: |
          set -euo pipefail
          test -f package.zip
          ls -lh package.zip

      - name: Create or update GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('node:fs');

          const token = process.env.GITHUB_TOKEN;
          const repo = process.env.GITHUB_REPOSITORY;
          const tag = process.env.RELEASE_TAG;
          const apiBase = process.env.GITHUB_API_URL || 'https://api.github.com';
          const artifactPath = 'package.zip';
          const assetName = 'package.zip';

          if (!token) throw new Error('GITHUB_TOKEN is missing.');
          if (!repo) throw new Error('GITHUB_REPOSITORY is missing.');
          if (!tag || !tag.startsWith('v')) throw new Error(`Invalid release tag: ${tag}`);
          if (!fs.existsSync(artifactPath)) throw new Error(`${artifactPath} was not generated.`);

          function parseJson(text) {
            if (!text) return null;
            try {
              return JSON.parse(text);
            } catch {
              return text;
            }
          }

          async function request(url, options = {}) {
            const response = await fetch(url, {
              ...options,
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
                ...(options.headers || {}),
              },
            });
            const text = await response.text();
            const data = parseJson(text);

            if (!response.ok) {
              const message = data && typeof data === 'object' && data.message ? data.message : text;
              const error = new Error(`${options.method || 'GET'} ${url} failed (${response.status}): ${message}`);
              error.status = response.status;
              throw error;
            }

            return data;
          }

          async function getReleaseByTag() {
            try {
              return await request(`${apiBase}/repos/${repo}/releases/tags/${encodeURIComponent(tag)}`);
            } catch (error) {
              if (error.status === 404) return null;
              throw error;
            }
          }

          async function main() {
            let release = await getReleaseByTag();

            if (release) {
              console.log(`[release] Updating existing release ${tag}.`);
              release = await request(`${apiBase}/repos/${repo}/releases/${release.id}`, {
                method: 'PATCH',
                body: JSON.stringify({
                  name: tag,
                  prerelease: false,
                  draft: false,
                }),
              });
            } else {
              console.log(`[release] Creating release ${tag}.`);
              release = await request(`${apiBase}/repos/${repo}/releases`, {
                method: 'POST',
                body: JSON.stringify({
                  tag_name: tag,
                  name: tag,
                  prerelease: false,
                  draft: false,
                }),
              });
            }

            const assets = await request(`${apiBase}/repos/${repo}/releases/${release.id}/assets?per_page=100`);
            for (const asset of assets) {
              if (asset.name === assetName) {
                console.log(`[release] Removing existing asset ${assetName}.`);
                await request(`${apiBase}/repos/${repo}/releases/assets/${asset.id}`, { method: 'DELETE' });
              }
            }

            const artifact = fs.readFileSync(artifactPath);
            const uploadUrl = `https://uploads.github.com/repos/${repo}/releases/${release.id}/assets?name=${encodeURIComponent(assetName)}`;
            await request(uploadUrl, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/zip',
                'Content-Length': String(artifact.byteLength),
              },
              body: artifact,
            });

            console.log(`[release] Uploaded ${assetName} to ${tag}.`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
